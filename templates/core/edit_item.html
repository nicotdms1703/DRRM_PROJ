{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Resource{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto p-6 bg-white dark:bg-gray-800 rounded-xl shadow-lg">
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">Edit Resource</h2>

  {% if error_message %}
    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" role="alert">
      <span class="block sm:inline">{{ error_message }}</span>
    </div>
  {% endif %}

  <form method="POST" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="name">Resource Name</label>
      <input type="text" name="name" id="name" required
             class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-enterprise-deep"
             value="{{ item.name }}">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="category">Category</label>
      <select name="category" id="category" required
              class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-enterprise-deep">
        <option value="Equipment" {% if item.category == 'Equipment' %}selected{% endif %}>Equipment</option>
        <option value="Consumable" {% if item.category == 'Consumable' %}selected{% endif %}>Consumable</option>
        <option value="Medical" {% if item.category == 'Medical' %}selected{% endif %}>Medical</option>
        <option value="Safety" {% if item.category == 'Safety' %}selected{% endif %}>Safety</option>
        <option value="Tools" {% if item.category == 'Tools' %}selected{% endif %}>Tools</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="description">Description (Optional)</label>
      <textarea name="description" id="description" rows="3"
                class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-enterprise-deep">{{ item.description }}</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="quantity">Quantity</label>
        <input type="number" name="quantity" id="quantity" min="0" required
               class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-enterprise-deep"
               value="{{ item.quantity }}">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="low_stock_threshold">Low Stock Alert At</label>
        <input type="number" name="low_stock_threshold" id="low_stock_threshold" min="0" required
               class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-enterprise-deep"
               value="{{ item.low_stock_threshold }}">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="max_capacity">Max Capacity (Optional)</label>
      <input type="number" name="max_capacity" id="max_capacity" min="0"
             class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-enterprise-deep"
             value="{{ item.max_capacity|default_if_none:'' }}">
    </div>

    <div class="flex items-center justify-between pt-4">
      <button type="submit" form="delete-form" onclick="return confirm('Are you sure you want to delete this resource? This action cannot be undone.');" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">Delete Resource</button>
      <div class="flex items-center space-x-4">
        <a href="{% url 'inventory' %}" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">Cancel</a>
        <button type="submit" class="px-4 py-2 bg-enterprise-deep text-white rounded hover:brightness-110 transition">Save Changes</button>
      </div>
    </div>
  </form>

  <form id="delete-form" action="{% url 'delete_item' item.id %}" method="POST" class="hidden">
    {% csrf_token %}
  </form>
</div>
{% endblock %}
